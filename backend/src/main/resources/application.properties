server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/monitoring
spring.datasource.username=${DB_USER:monitoring}
spring.datasource.password=${DB_PASS:monitoring}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASS:redis_secret}

# OAuth2 Resource Server — valida JWTs emitidos por Keycloak
# Usando jwk-set-uri (carga lazy, no bloquea el arranque si Keycloak aún no está listo)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_URI:http://localhost:8180/realms/monitoring/protocol/openid-connect/certs}

# Actuator
management.endpoints.web.exposure.include=health,info
