name: PR Validation

on:
  pull_request:
    branches: [develop, master]

jobs:
  backend:
    name: Backend — compile & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn -f backend/pom.xml compile -q

      - name: Test
        run: mvn -f backend/pom.xml test
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          KEYCLOAK_JWK_URI: http://localhost:8180/realms/monitoring/protocol/openid-connect/certs

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Lint
        run: npm run lint --prefix frontend || true

      - name: Build
        run: npm run build --prefix frontend -- --configuration production
