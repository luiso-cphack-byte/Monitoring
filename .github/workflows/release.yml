name: Release & Deploy Production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend JAR
        run: mvn -f backend/pom.xml clean package -DskipTests -q

      - name: Build frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend -- --configuration production

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  create-github-release:
    name: Create GitHub Release
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.jar
          body: |
            ## Cambios en ${{ github.ref_name }}

            Ver [CHANGELOG](CHANGELOG.md) para detalles completos.

            ### Deploy
            - Backend: Railway production
            - Frontend: GitHub Pages `/`

  deploy-production:
    name: Deploy → Production
    needs: create-github-release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to Railway (production)
        run: |
          npm install -g @railway/cli
          railway up --service monitoring-backend
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Deploy frontend to GitHub Pages (production)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist/frontend/browser
          destination_dir: .
          keep_files: false
