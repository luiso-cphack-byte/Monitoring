<div style="padding: 24px">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px">
    <h2>Métricas</h2>
    <a mat-raised-button color="primary" routerLink="/metrics/new">Nueva métrica</a>
  </div>

  <mat-spinner *ngIf="loading" diameter="40" style="margin: auto"></mat-spinner>

  <table mat-table [dataSource]="metrics" *ngIf="!loading">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let m">{{ m.name }}</td>
    </ng-container>
    <ng-container matColumnDef="value">
      <th mat-header-cell *matHeaderCellDef>Valor</th>
      <td mat-cell *matCellDef="let m">{{ m.value }}</td>
    </ng-container>
    <ng-container matColumnDef="unit">
      <th mat-header-cell *matHeaderCellDef>Unidad</th>
      <td mat-cell *matCellDef="let m">{{ m.unit }}</td>
    </ng-container>
    <ng-container matColumnDef="source">
      <th mat-header-cell *matHeaderCellDef>Fuente</th>
      <td mat-cell *matCellDef="let m">{{ m.source }}</td>
    </ng-container>
    <ng-container matColumnDef="timestamp">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let m">{{ m.timestamp | date:'short' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let m">
        <a mat-icon-button [routerLink]="['/metrics', m.id, 'edit']">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="delete(m.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="!loading && metrics.length === 0">No hay métricas aún.</p>
</div>
